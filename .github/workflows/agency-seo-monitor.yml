name: Agency SEO Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '23 14 * * *'

concurrency:
  group: hicks-consulting-content-automation
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      LIVE_SITE_URL: https://www.hicksconsulting.org
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
      GSC_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GSC_SERVICE_ACCOUNT_EMAIL }}
      GSC_PRIVATE_KEY: ${{ secrets.GSC_PRIVATE_KEY }}
      GSC_ACCESS_TOKEN: ${{ secrets.GSC_ACCESS_TOKEN }}
      BING_SITE_URL: ${{ secrets.BING_SITE_URL }}
      BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: git pull --rebase origin main
      - run: npm ci
      - name: Refresh live, GSC, and Bing snapshots
        run: npm run agency:refresh
        continue-on-error: true
      - name: Build dashboard and advisory QA report
        run: npm run build
        continue-on-error: true
      - name: Commit monitoring snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/agency)" ]]; then
            git add data/agency
            git commit -m "Refresh agency SEO monitoring snapshots"
            git push
          else
            echo "No agency monitoring changes to commit."
          fi
        continue-on-error: true
      - name: Upload advisory monitoring artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hicks-agency-seo-monitor
          path: data/agency/
