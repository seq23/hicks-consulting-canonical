name: Build
on:
  workflow_dispatch:
  push:
    branches: [main]
concurrency:
  group: hicks-consulting-main
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run validate:all
      - run: npm run build
