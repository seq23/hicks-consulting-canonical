name: Social Ingestion

on:
  workflow_dispatch:
  schedule:
    - cron: '41 14 * * 2,5'

concurrency:
  group: hicks-consulting-content-automation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: git pull --rebase origin main

      - run: npm ci

      - run: npm run ingest:all

      - run: npm run build

      - run: npm run validate:all

      - name: Commit social ingestion outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain data/intake data/social pages/llm-atlas llms.txt sitemap.xml)" ]]; then
            git add data/intake data/social pages/llm-atlas llms.txt sitemap.xml
            git commit -m "Update social ingestion and LLM atlas outputs"
            git push
          else
            echo "No social ingestion changes to commit."
          fi
